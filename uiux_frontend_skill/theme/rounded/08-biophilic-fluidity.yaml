# Biophilic Fluidity — rounded category. See theme/_schema/style.schema.yaml.

identity:
  id: biophilic-fluidity
  name: Biophilic Fluidity
  category: rounded
  version: "1.0.0"
  primary_mode: light
  summary: Nature-derived organic forms — cards and buttons with different radii per corner, like leaves or petals, in living greens.
  description: >
    Adapts the shapes of nature. Elements curve more on one side than another
    (leaf/petal-like asymmetry), flowing layouts mimic growth and water, and the
    palette is built from foliage greens, sky, and soil. Calming and alive.
  keywords: [biophilic, organic, nature, leaf, fluid, green, growth, asymmetric]
  mood: [natural, calm, alive, fresh, optimistic]
  use_cases: [AgriTech platforms, renewable-energy dashboards, plant-based / diet apps, sustainability brands]
  avoid_when: [hard tech/finance tools, brutalist or retro aesthetics, ultra-dense data UIs]
  references: [biophilic design, leaf/petal geometry, nature-inspired UI, fluid blob shapes]

typography:
  font_families:
    display:
      stack: "'Quicksand', 'Lexend', sans-serif"
      source: google-fonts
      weights: [500, 600, 700]
    heading:
      stack: "'Lora', 'Georgia', serif"
      source: google-fonts
      weights: [500, 600]
      note: Optional humanist serif for editorial headings.
    body:
      stack: "'Lexend', 'Inter', sans-serif"
      source: google-fonts
      weights: [400, 500]
  scale:
    base_size: "16px"
    ratio: 1.25
    steps:
      display: "3.052rem"
      h1: "2.441rem"
      h2: "1.953rem"
      h3: "1.563rem"
      h4: "1.25rem"
      body_lg: "1.125rem"
      body: "1rem"
      body_sm: "0.875rem"
      caption: "0.75rem"
      overline: "0.75rem"
  weights:
    regular: 400
    medium: 500
    bold: 600
    black: 700
  line_height:
    tight: 1.25
    normal: 1.6
    relaxed: 1.75
  letter_spacing:
    tight: "-0.01em"
    normal: "0em"
    wide: "0.04em"
  treatments:
    font_style: normal
    transform: "none"
    text_transform: none
    text_decoration: "none"
    text_stroke: "none"
    text_shadow: "none"
    highlight:
      color: "#d9f0c2"
      style: marker
    per_role:
      overline: { text_transform: uppercase, letter_spacing: "0.04em" }

color:
  light:
    recommended: true
    background: "#f4f8ef"
    surface: "#ffffff"
    surface_alt: "#e8f1de"
    text_primary: "#243520"
    text_secondary: "#485a40"
    text_muted: "#7d8c74"
    text_inverse: "#ffffff"
    border: "#d4e3c4"
    accent: "#4a9d52"
    accent_secondary: "#e0913a"
    accent_tertiary: "#5fb3c4"
    interactive:
      default: "#4a9d52"
      hover: "#3d8845"
      active: "#327138"
      focus_ring: "#5fb3c4"
      disabled: "#cfddc2"
    status:
      error: "#c4523a"
      warning: "#e0913a"
      success: "#4a9d52"
      info: "#5fb3c4"
    overlay: "rgba(36,53,32,0.4)"
    gradients:
      leaf: "linear-gradient(135deg, #4a9d52 0%, #7ec46a 100%)"
    note: Living greens with earth and sky accents on a soft leaf-white base. Fresh, optimistic, natural.
  dark:
    recommended: true
    background: "#16201a"
    surface: "#1e2a21"
    surface_alt: "#26352a"
    text_primary: "#e2eedd"
    text_secondary: "#b2c4a8"
    text_muted: "#7a8c70"
    text_inverse: "#16201a"
    border: "#33442f"
    accent: "#6fc06a"
    accent_secondary: "#e0a455"
    accent_tertiary: "#6fc6d6"
    interactive:
      default: "#6fc06a"
      hover: "#82d07c"
      active: "#5aa856"
      focus_ring: "#6fc6d6"
      disabled: "#33442f"
    status:
      error: "#d66a52"
      warning: "#e0a455"
      success: "#6fc06a"
      info: "#6fc6d6"
    overlay: "rgba(0,0,0,0.5)"
    gradients:
      leaf: "linear-gradient(135deg, #3d8845 0%, #6fc06a 100%)"
    note: Forest-night greens; deep canopy backdrop with vivid leaf accents.

radius:
  philosophy: "Per-corner asymmetric radii to suggest leaves and petals — never uniform."
  default: "8px 32px 8px 32px"
  scale:
    none: "0px"
    sm: "4px 16px 4px 16px"
    md: "8px 32px 8px 32px"
    lg: "16px 56px 16px 56px"
    xl: "30% 70% 70% 30% / 30% 30% 70% 70%"
    pill: "999px"

spacing:
  base: "8px"
  scale: ["0px", "8px", "16px", "24px", "40px", "64px", "96px"]
  grid:
    columns: 12
    gutter: "28px"
    margin: "28px"
    max_width: "1120px"
  density: comfortable

border:
  default_width: "1px"
  style: solid
  philosophy: "Soft, low-contrast green borders if used; mostly fill + gentle shadow."
  width:
    hairline: "1px"
    thin: "1px"
    thick: "1.5px"
    heavy: "2px"

elevation:
  type: soft
  philosophy: "Soft green-tinted shadows like dappled light through leaves."
  tokens:
    sm: "0 4px 12px rgba(36,53,32,0.08)"
    md: "0 8px 24px rgba(36,53,32,0.1)"
    lg: "0 16px 40px rgba(36,53,32,0.14)"
  dark_tokens:
    sm: "0 4px 12px rgba(0,0,0,0.4)"
    md: "0 8px 24px rgba(0,0,0,0.45)"
    lg: "0 16px 40px rgba(0,0,0,0.5)"

motion:
  duration:
    fast: "180ms"
    base: "380ms"
    slow: "700ms"
  easing:
    standard: "cubic-bezier(0.33, 0, 0.2, 1)"
    entrance: "cubic-bezier(0.16, 1, 0.3, 1)"
    exit: "cubic-bezier(0.7, 0, 0.84, 0)"
    bounce: "cubic-bezier(0.34, 1.3, 0.64, 1)"
  signature: "gentle growth/sway — elements unfurl and ease like plants in a breeze"
  reduced_motion_note: "Replace unfurl/sway with simple fades."

texture_and_effects:
  backdrop_filter: "none"
  noise: "very subtle organic grain, opacity 0.04"
  overlays: []
  patterns: ["leaf-vein / botanical line motifs as subtle accents"]
  glow: "none"
  special:
    - "Per-corner asymmetric radii and blob shapes for cards/avatars"
    - "Flowing, curved section dividers (SVG wave/leaf edges)"
    - "Botanical line illustrations as accents"

components:
  button:
    primary:
      shape: organic
      radius: "8px 24px 8px 24px"
      border: "none"
      padding: "14px 28px"
      background: "#4a9d52"
      color: "#ffffff"
      shadow: "0 4px 14px rgba(74,157,82,0.3)"
      font: "display, semibold"
      hover: "background: #3d8845"
      active: "transform: translateY(1px)"
      focus: "outline: 2px solid #5fb3c4; outline-offset: 3px"
    secondary:
      shape: organic
      radius: "8px 24px 8px 24px"
      border: "1px solid #d4e3c4"
      padding: "14px 28px"
      background: "transparent"
      color: "#327138"
      shadow: "none"
    ghost:
      background: "transparent"
      color: "#4a9d52"
      border: "none"
  input:
    radius: "8px 20px 8px 20px"
    border: "1px solid #d4e3c4"
    background: "#ffffff"
    padding: "14px 18px"
    placeholder_color: "#7d8c74"
    focus: "border-color: #4a9d52; box-shadow: 0 0 0 3px rgba(74,157,82,0.15)"
    note: "Leaf-shaped asymmetric field."
  card:
    radius: "8px 32px 8px 32px"
    border: "none"
    background: "#ffffff"
    padding: "28px"
    shadow: "0 8px 24px rgba(36,53,32,0.1)"
    hover: "transform: translateY(-2px)"
  container:
    max_width: "1120px"
    padding: "28px"
    section_gap: "96px"
    note: "Open, breathing layout with curved section transitions."
  navbar:
    height: "72px"
    background: "rgba(244,248,239,0.85)"
    border: "none"
    shadow: "0 4px 16px rgba(36,53,32,0.06)"
    blur: "blur(8px)"
    item_style: "soft text links; active item leaf-pill fill"
    note: "Light, airy nav."
  sidebar:
    width: "260px"
    background: "#e8f1de"
    border: "none"
    item_style: "organic rounded rows; active row leaf-green fill"
  modal:
    radius: "16px 48px 16px 48px"
    background: "#ffffff"
    border: "none"
    shadow: "0 24px 60px rgba(36,53,32,0.2)"
    overlay: "rgba(36,53,32,0.4)"
  badge:
    radius: "999px"
    border: "none"
    background: "#d9f0c2"
    color: "#327138"
    padding: "3px 12px"
    font: "body, medium"
  table:
    header_background: "#e8f1de"
    row_border: "1px solid #e2ecd6"
    zebra: "#f6faf0"
    cell_padding: "14px 18px"
  tabs:
    indicator: "active tab a leaf-shaped green pill"
    radius: "8px 20px 8px 20px"
    active: "background #4a9d52; color #ffffff"
    inactive: "color #485a40"

iconography:
  style: outline
  stroke_width: "1.75px"
  library: "rounded line icons + botanical/leaf motifs"
  note: "Rounded caps; nature-themed glyphs where relevant."

imagery:
  treatment: ["rounded-mask"]
  border_radius: "30% 70% 70% 30% / 30% 30% 70% 70%"
  filter: "saturate(1.05)"
  note: "Leaf/blob-masked imagery; natural light, foliage subjects."

guidelines:
  do:
    - "Vary corner radii to suggest leaves/petals"
    - "Use a living green palette with earth/sky accents"
    - "Add flowing curved section dividers"
    - "Animate with gentle organic easing"
  dont:
    - "Don't use uniform rectangles or sharp corners"
    - "Don't use cold tech-blue or neon palettes"
    - "Don't make motion mechanical or abrupt"

implementation_hints:
  css_variables_prefix: "--bio-"
  framework_agnostic: true
  tailwind_note: "Per-corner radius via arbitrary values; blob shapes via border-radius % syntax; SVG wave/leaf section dividers; green-forward color tokens."
  font_loading:
    - "https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Lexend:wght@400;500&family=Lora:wght@500;600&display=swap"
  accessibility_note: "Greens can be tricky for color-blind users — pair status colors with icons/labels; verify text contrast on green fills."

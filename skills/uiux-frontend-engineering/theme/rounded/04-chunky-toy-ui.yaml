# Chunky "Toy" UI — rounded category. See theme/_schema/style.schema.yaml.

identity:
  id: chunky-toy-ui
  name: Chunky Toy UI
  category: rounded
  version: "1.0.0"
  primary_mode: light
  summary: Plastic-toy interface — thick pill buttons, giant rounded icons, bright colored drop shadows, and bouncy animation.
  description: >
    Reminiscent of chunky plastic toys and gamified apps. Big rounded shapes,
    thick solid colored shadows that act like a 3D base, oversized friendly
    icons, and springy, bouncy motion. Loud, fun, and very clickable.
  keywords: [chunky, toy, gamified, bouncy, pill, playful, duolingo, kids]
  mood: [fun, energetic, friendly, bold, gamified]
  use_cases: [gamified platforms, language-learning apps, kids products, habit/streak apps]
  avoid_when: [serious enterprise tools, finance/legal products, minimalist premium brands]
  references: [Duolingo, mobile game UIs, plastic toy design, gamification patterns]

typography:
  font_families:
    display:
      stack: "'Fredoka', 'Baloo 2', sans-serif"
      source: google-fonts
      weights: [500, 600, 700]
      note: Rounded chunky display face.
    body:
      stack: "'Nunito', 'Fredoka', sans-serif"
      source: google-fonts
      weights: [600, 700, 800]
  scale:
    base_size: "16px"
    ratio: 1.25
    steps:
      display: "3.052rem"
      h1: "2.441rem"
      h2: "1.953rem"
      h3: "1.563rem"
      h4: "1.25rem"
      body_lg: "1.125rem"
      body: "1rem"
      body_sm: "0.875rem"
      caption: "0.8125rem"
      overline: "0.8125rem"
  weights:
    regular: 600
    medium: 700
    bold: 800
    black: 800
  line_height:
    tight: 1.15
    normal: 1.5
    relaxed: 1.65
  letter_spacing:
    tight: "-0.01em"
    normal: "0em"
    wide: "0.03em"
  treatments:
    font_style: normal
    transform: "none"
    text_transform: none
    text_decoration: "none"
    text_stroke: "none"
    text_shadow: "none"
    highlight:
      color: "#ffe14d"
      style: marker
    per_role:
      display: { letter_spacing: "-0.01em" }

color:
  light:
    recommended: true
    background: "#fff9ee"
    surface: "#ffffff"
    surface_alt: "#fff2d9"
    text_primary: "#3d2f1f"
    text_secondary: "#6b5840"
    text_muted: "#a89476"
    text_inverse: "#ffffff"
    border: "#3d2f1f"
    accent: "#58cc02"
    accent_secondary: "#ff4b4b"
    accent_tertiary: "#1cb0f6"
    interactive:
      default: "#58cc02"
      hover: "#61e002"
      active: "#46a302"
      focus_ring: "#1cb0f6"
      disabled: "#e0d8c8"
    status:
      error: "#ff4b4b"
      warning: "#ffc800"
      success: "#58cc02"
      info: "#1cb0f6"
    overlay: "rgba(61,47,31,0.4)"
    gradients: {}
    note: Bright saturated primaries (Duolingo-like green/red/blue) with thick colored drop-shadow bases.
  dark:
    recommended: true
    background: "#1f1b2e"
    surface: "#2a2540"
    surface_alt: "#332d4d"
    text_primary: "#f5f0ff"
    text_secondary: "#c8c0e0"
    text_muted: "#8f87a8"
    text_inverse: "#1f1b2e"
    border: "#0f0c1a"
    accent: "#6ee010"
    accent_secondary: "#ff5e5e"
    accent_tertiary: "#3ac0ff"
    interactive:
      default: "#6ee010"
      hover: "#7ef520"
      active: "#5cc008"
      focus_ring: "#3ac0ff"
      disabled: "#3a3550"
    status:
      error: "#ff5e5e"
      warning: "#ffd233"
      success: "#6ee010"
      info: "#3ac0ff"
    overlay: "rgba(0,0,0,0.55)"
    gradients: {}
    note: Night-mode toy box — same bright accents, darker chunky shadow bases (near-black).

radius:
  philosophy: "Big, chunky, pill-shaped rounding everywhere."
  default: "20px"
  scale:
    none: "0px"
    sm: "12px"
    md: "20px"
    lg: "28px"
    xl: "40px"
    pill: "999px"

spacing:
  base: "8px"
  scale: ["0px", "8px", "16px", "24px", "32px", "48px", "64px"]
  grid:
    columns: 12
    gutter: "24px"
    margin: "24px"
    max_width: "1080px"
  density: comfortable

border:
  default_width: "2px"
  style: solid
  philosophy: "Optional thick dark outline; the real depth comes from the solid colored bottom shadow."
  width:
    hairline: "1px"
    thin: "2px"
    thick: "3px"
    heavy: "4px"

elevation:
  type: hard-drop
  philosophy: "Solid colored bottom shadow acts as a 3D base; press collapses the base."
  tokens:
    sm: "0 3px 0 0 rgba(61,47,31,0.25)"
    md: "0 5px 0 0 rgba(61,47,31,0.3)"
    lg: "0 8px 0 0 rgba(61,47,31,0.35)"
  dark_tokens:
    sm: "0 3px 0 0 rgba(0,0,0,0.6)"
    md: "0 5px 0 0 rgba(0,0,0,0.6)"
    lg: "0 8px 0 0 rgba(0,0,0,0.6)"

motion:
  duration:
    fast: "120ms"
    base: "220ms"
    slow: "380ms"
  easing:
    standard: "cubic-bezier(0.34, 1.4, 0.64, 1)"
    entrance: "cubic-bezier(0.34, 1.56, 0.64, 1)"
    exit: "cubic-bezier(0.5, 0, 0.75, 0)"
    bounce: "cubic-bezier(0.34, 1.8, 0.5, 1)"
  signature: "bouncy overshoot on everything — buttons pop, mascots wiggle, rewards spring"
  reduced_motion_note: "Remove overshoot/wiggle; use plain quick fades."

texture_and_effects:
  backdrop_filter: "none"
  noise: "none"
  overlays: []
  patterns: []
  glow: "none"
  special:
    - "Solid colored bottom shadow as a button 'base'; press = translateY down + shadow shrinks"
    - "Oversized rounded icons and mascot illustrations"
    - "Confetti / reward bursts on success"

components:
  button:
    primary:
      shape: pill
      radius: "999px"
      border: "none"
      padding: "16px 32px"
      background: "#58cc02"
      color: "#ffffff"
      shadow: "0 5px 0 0 #46a302"
      font: "display, bold, uppercase"
      hover: "filter: brightness(1.05)"
      active: "transform: translateY(4px); box-shadow: 0 1px 0 0 #46a302"
      focus: "outline: 4px solid rgba(28,176,246,0.5); outline-offset: 3px"
    secondary:
      shape: pill
      radius: "999px"
      border: "2px solid #e0d8c8"
      padding: "16px 32px"
      background: "#ffffff"
      color: "#58cc02"
      shadow: "0 4px 0 0 #e0d8c8"
    ghost:
      background: "transparent"
      color: "#1cb0f6"
      border: "none"
  input:
    radius: "16px"
    border: "2px solid #e0d8c8"
    background: "#ffffff"
    padding: "14px 18px"
    placeholder_color: "#a89476"
    focus: "border-color: #1cb0f6; box-shadow: 0 0 0 4px rgba(28,176,246,0.15)"
    note: "Chunky rounded field with thick border."
  card:
    radius: "24px"
    border: "2px solid #f0e8d8"
    background: "#ffffff"
    padding: "24px"
    shadow: "0 5px 0 0 rgba(61,47,31,0.12)"
    hover: "transform: translateY(-2px)"
  container:
    max_width: "1080px"
    padding: "24px"
    section_gap: "48px"
    note: "Friendly, roomy layout."
  navbar:
    height: "72px"
    background: "#ffffff"
    border: "0 0 2px 0 solid #f0e8d8"
    shadow: "0 4px 0 0 rgba(61,47,31,0.06)"
    blur: "none"
    item_style: "chunky pill items; active item filled accent with bottom shadow"
    note: "Bold, tappable nav."
  sidebar:
    width: "260px"
    background: "#fff9ee"
    border: "none"
    item_style: "big rounded rows with icon; active row filled accent pill"
  modal:
    radius: "28px"
    background: "#ffffff"
    border: "none"
    shadow: "0 12px 0 0 rgba(61,47,31,0.15)"
    overlay: "rgba(61,47,31,0.4)"
  badge:
    radius: "999px"
    border: "none"
    background: "#ffc800"
    color: "#3d2f1f"
    padding: "4px 12px"
    font: "display, bold"
  table:
    header_background: "#fff2d9"
    row_border: "2px solid #f0e8d8"
    zebra: "#fffaf0"
    cell_padding: "14px 18px"
  tabs:
    indicator: "active tab is a filled accent pill with bottom shadow"
    radius: "999px"
    active: "background #58cc02; color #ffffff; box-shadow 0 4px 0 0 #46a302"
    inactive: "background transparent; color #6b5840"

iconography:
  style: filled
  stroke_width: "3px"
  library: "chunky rounded filled icons; mascot illustrations"
  note: "Big, friendly, rounded; filled with bright color."

imagery:
  treatment: ["rounded-mask"]
  border_radius: "24px"
  filter: "saturate(1.15)"
  note: "Bright, saturated illustration over photography; rounded masks."

guidelines:
  do:
    - "Use solid colored bottom shadows as 3D bases"
    - "Make everything big, rounded, and tappable"
    - "Add bouncy overshoot motion"
    - "Use bright, saturated primaries"
  dont:
    - "Don't use thin lines or subtle palettes"
    - "Don't use sharp corners"
    - "Don't make tap targets small"

implementation_hints:
  css_variables_prefix: "--toy-"
  framework_agnostic: true
  tailwind_note: "Solid bottom shadow as custom boxShadow; large radius scale; bounce easing in transitionTimingFunction; big padding."
  font_loading:
    - "https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800&display=swap"
  accessibility_note: "Bright color pairs must still pass contrast; honor reduced-motion for bounce; keep large hit targets (good for accessibility)."

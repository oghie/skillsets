id: sap-hybris
name: SAP Hybris / SAP Commerce
category: enterprise_app
vendor: SAP
author: haxxm0nkey
credentials:
- id: admin-console-default
  name: Local Development Admin Console Credential
  description: SAP Commerce/Hybris development and accelerator setups commonly include local
    administrative users for HAC, backoffice, and administration consoles. Production deployments
    should change seeded/demo credentials and rely on configured identity stores.
  type: username_password
  nature:
  - static_default
  - user_defined
  sensitivity: secret
  default:
    username: admin
    password: nimda
  location:
  - type: public_interface
    path: Hybris Administration Console, Backoffice, SmartEdit, OCC, and storefront login
  - type: database
    detail: SAP Commerce user model tables and password hash fields
  - type: config_file
    detail: local.properties, project.properties, impex seed data, and deployment configs
  - type: artifact
    detail: database dumps, initialization exports, and environment backups
  notes: admin/nimda is modeled as a common seeded/development credential; do not assume it
    is valid for hardened production Commerce Cloud deployments.
- id: user-password-hash
  name: Customer / Employee Password Hash
  description: SAP Commerce stores employee, administrator, and customer account password
    hashes in the platform database.
  type: username_password
  nature:
  - user_defined
  - generated_on_install
  sensitivity: secret
  location:
  - type: database
    detail: SAP Commerce user/customer/employee item tables and credential attributes
  - type: public_interface
    path: storefront, OCC APIs, Backoffice, HAC, and SmartEdit
  - type: source_code
    detail: impex files, sample data, integration tests, and initialization scripts
  - type: artifact
    detail: database dumps and system copies
- id: oauth-client-secret
  name: OAuth / OCC Client Secret
  description: SAP Commerce OAuth2/OCC integrations use client IDs, client secrets, access
    tokens, and refresh tokens for API access.
  type: secret_value
  nature:
  - generated_on_install
  - user_defined
  sensitivity: secret
  location:
  - type: http_header
    path: Authorization
    detail: Bearer token or Basic client credentials used for OCC/OAuth requests
  - type: database
    detail: OAuth client details, access token, and refresh token storage
  - type: config_file
    detail: local.properties, extension config, manifest secrets, and API client configs
  - type: environment
    path: HYBRIS_CLIENT_SECRET, SAP_COMMERCE_CLIENT_SECRET, OCC_CLIENT_SECRET
  - type: secret_store
    detail: Commerce Cloud portal variables, Kubernetes Secrets, and vaults
  - type: source_code
    detail: integration clients and tests
  - type: logs
    detail: OAuth debug logs and API traces
- id: database-mail-integration-secrets
  name: Database, Mail, Search, and Integration Secrets
  description: SAP Commerce configuration contains database passwords, SMTP passwords, Solr
    credentials, payment provider secrets, SSO/SAML keys, and extension-specific integration
    tokens.
  type: secret_value
  nature:
  - user_defined
  - generated_on_install
  sensitivity: secret
  looks_like:
  - pattern: (?i)^(db\.password|mail\.smtp\.password|.*\.secret|.*\.password)\s*=\s*.+$
    detail: SAP Commerce properties line carrying a password or secret
  location:
  - type: config_file
    path: local.properties, project.properties, manifest.json
    detail: runtime and extension secret configuration
  - type: secret_store
    detail: SAP Commerce Cloud variables, vaults, and Kubernetes/Docker secrets
  - type: source_code
    detail: extension properties, impex, deployment templates, and CI variables
  - type: logs
    detail: startup, integration, and payment/debug logs
references:
- type: docs
  url: https://help.sap.com/docs/SAP_COMMERCE_CLOUD_PUBLIC_CLOUD
- type: docs
  url: https://help.sap.com/docs/SAP_COMMERCE/0fa6bcf4736c46f78c248512391eb467/8bee3a8786624d6e836a32a39f8f9b55.html

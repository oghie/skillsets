id: apache-solr
name: Apache Solr
category: database
vendor: Apache Software Foundation
author: haxxm0nkey
credentials:
- id: unauthenticated-default
  name: Unauthenticated Solr API/Admin Access
  description: Solr does not require HTTP authentication until an authentication plugin is
    configured through security.json or equivalent deployment configuration. Without auth,
    Admin UI and query/update APIs may be reachable to anyone with network access.
  type: username_password
  nature:
  - unauthenticated_default
  sensitivity: secret
  default:
    username: null
    password: null
  location:
  - type: public_interface
    path: Solr Admin UI and HTTP APIs, commonly :8983/solr
    detail: Admin, collections, config, query, and update endpoints when no auth plugin is
      active
  - type: config_file
    path: security.json
    detail: absence of authentication plugin or blockUnknown/user configuration means no Solr
      HTTP auth enforcement
  - type: database
    detail: ZooKeeper-stored security.json for SolrCloud clusters
  - type: logs
    detail: Solr startup and security plugin logs indicating whether authentication is configured
  notes: This represents absence of Solr HTTP authentication, not a blank username/password.
    Exposure depends on security.json, SolrCloud ZooKeeper state, reverse proxies, network
    controls, and collection/update permissions.
- id: basic-auth-user-password
  name: Solr Basic Authentication User Password
  description: Solr can enable the BasicAuthPlugin or other authentication plugins in security.json.
    Users and password hashes protect the Admin UI, Collections API, and query/update APIs.
  type: username_password
  nature:
  - user_defined
  - generated_on_install
  sensitivity: secret
  location:
  - type: public_interface
    path: Solr Admin UI, Collections API, query/update handlers, and V2 APIs
  - type: config_file
    path: security.json
    detail: authentication plugin, users, password hashes, blockUnknown, and authorization
      config
  - type: database
    detail: ZooKeeper security.json storage for SolrCloud clusters
  - type: secret_store
    detail: Kubernetes Secrets, Solr Operator secrets, and password vaults
  - type: logs
    detail: Solr request logs, security audit logs, and client traces
- id: bearer-jwt-and-api-token
  name: JWT / Bearer Token Credential
  description: Solr can use JWT/OIDC or plugin-based bearer tokens for API access. Clients
    present tokens to query and update collections.
  type: token
  nature:
  - generated_on_install
  - user_defined
  sensitivity: secret
  location:
  - type: http_header
    path: Authorization
    detail: Basic or Bearer/JWT token for Solr API requests
  - type: config_file
    detail: security.json, OIDC/JWT plugin configuration, client configs, and .env files
  - type: environment
    path: SOLR_AUTH_TYPE, SOLR_AUTHENTICATION_OPTS, SOLR_TOKEN
  - type: secret_store
    detail: CI/CD variables, Kubernetes Secrets, and identity-provider client stores
  - type: logs
    detail: HTTP traces and auth plugin debug logs
- id: zk-digest-and-jaas-secret
  name: ZooKeeper Digest / Kerberos JAAS Secret
  description: SolrCloud deployments commonly protect ZooKeeper with digest auth, SASL/Kerberos,
    JAAS files, and ZK ACL credentials.
  type: secret_value
  nature:
  - user_defined
  - generated_on_install
  sensitivity: secret
  location:
  - type: config_file
    path: solr.in.sh, jaas.conf, zoo.cfg
    detail: ZooKeeper digest credentials, JAAS login modules, and Solr ZK auth settings
  - type: environment
    path: SOLR_ZK_CREDS_AND_ACLS, SOLR_JAAS_FILE
  - type: secret_store
    detail: Kubernetes Secrets, keytabs, and deployment vaults
  - type: logs
    detail: ZooKeeper ACL/auth logs and SolrCloud startup logs
- id: tls-private-key-and-keystore
  name: TLS Keystore / Private Key
  description: Solr can secure HTTP and internode traffic with TLS keystores, truststores,
    and private keys.
  type: key_pair
  nature:
  - generated_on_install
  - user_defined
  sensitivity: secret
  looks_like:
  - pattern: '-----BEGIN (RSA |EC |ENCRYPTED |)PRIVATE KEY-----'
    detail: private key material for Solr HTTP or internode TLS
  location:
  - type: config_file
    path: solr.in.sh, solr-ssl.keystore.p12, solr-ssl.keystore.jks
    detail: SSL key/trust store paths and passwords
  - type: environment
    path: SOLR_SSL_KEY_STORE_PASSWORD, SOLR_SSL_TRUST_STORE_PASSWORD
  - type: secret_store
    detail: Kubernetes Secrets, Java keystores, and certificate vaults
  - type: artifact
    detail: cluster backups and support bundles
references:
- type: docs
  url: https://solr.apache.org/guide/solr/latest/deployment-guide/basic-authentication-plugin.html
- type: docs
  url: https://solr.apache.org/guide/solr/latest/deployment-guide/authentication-and-authorization-plugins.html
- type: docs
  url: https://solr.apache.org/guide/solr/latest/deployment-guide/enabling-ssl.html

id: veeam-backup
name: Veeam Backup & Replication
category: other
vendor: Veeam
author: haxxm0nkey
credentials:
- id: console-user-password
  name: Console / Enterprise Manager User Password
  description: Veeam Backup & Replication uses Windows/domain/local users and roles for console,
    Enterprise Manager, REST API, and backup infrastructure administration.
  type: username_password
  nature:
  - user_defined
  - generated_on_install
  sensitivity: secret
  location:
  - type: public_interface
    path: Veeam console, Enterprise Manager, REST API, PowerShell, and service endpoints
  - type: database
    detail: Veeam configuration database users, roles, sessions, and encrypted credential
      records
  - type: config_file
    detail: PowerShell scripts, service account configs, and deployment automation
  - type: secret_store
    detail: Windows Credential Manager, Veeam credential manager, password vaults, and DPAPI-protected
      stores
  - type: logs
    detail: Veeam logs, REST traces, Enterprise Manager logs, and job session logs
- id: stored-managed-credential
  name: Stored Managed Credential
  description: Veeam stores credentials for vCenter/ESXi, Hyper-V, Windows/Linux servers,
    proxies, repositories, cloud providers, databases, NAS, and application-aware processing.
  type: secret_value
  nature:
  - user_defined
  - generated_on_install
  sensitivity: secret
  location:
  - type: database
    detail: Veeam configuration database encrypted credentials and backup infrastructure records
  - type: secret_store
    detail: Veeam credential manager, Windows DPAPI, enterprise vaults, and cloud secret stores
  - type: config_file
    detail: job configs, PowerShell exports, unattended install files, and repository configs
  - type: logs
    detail: job logs, guest processing logs, repository logs, and plugin traces
- id: encryption-password-key
  name: Backup Encryption Password / Key
  description: Veeam backup encryption uses passwords/keys that are required to restore encrypted
    backups. Enterprise Manager may escrow or recover keys depending on configuration.
  type: password
  nature:
  - user_defined
  - generated_on_install
  sensitivity: secret
  location:
  - type: database
    detail: Veeam configuration database encryption key metadata and password records
  - type: secret_store
    detail: Veeam key management, Enterprise Manager key escrow, KMS/HSM integrations, and
      recovery vaults
  - type: artifact
    detail: encrypted backup files, configuration backups, and recovery media
  - type: logs
    detail: backup, restore, and key management logs
- id: api-token-session
  name: REST API Token / Session
  description: Veeam Enterprise Manager and newer Veeam APIs issue bearer tokens or sessions
    for automation clients.
  type: token
  nature:
  - generated_on_install
  sensitivity: secret
  location:
  - type: http_header
    path: Authorization
    detail: Bearer token or Basic credentials used by Veeam API clients
  - type: http_header
    path: Cookie
    detail: web/API session cookie
  - type: config_file
    detail: API scripts, PowerShell automation, .env files, and monitoring configs
  - type: environment
    path: VEEAM_TOKEN, VEEAM_USERNAME, VEEAM_PASSWORD
  - type: secret_store
    detail: CI/CD variables and automation vaults
  - type: logs
    detail: REST API logs and client traces
references:
- type: docs
  url: https://helpcenter.veeam.com/docs/backup/vsphere/users_roles.html?ver=120
- type: docs
  url: https://helpcenter.veeam.com/docs/backup/vsphere/encryption_keys.html?ver=120

id: dokuwiki
name: DokuWiki
category: cms
vendor: DokuWiki
author: haxxm0nkey
credentials:
- id: local-user-password-hash
  name: Local User Password Hash
  description: DokuWiki local authentication stores users and password hashes in users.auth.php
    unless another auth plugin is configured.
  type: username_password
  nature:
  - user_defined
  sensitivity: secret
  looks_like:
  - pattern: ^[^:#\s]+:[^:]+:[^:]*:[^:]*:.*$
    detail: DokuWiki users.auth.php line with login, password hash, name, email, and groups
  location:
  - type: config_file
    path: conf/users.auth.php
    detail: local DokuWiki user credential file
  - type: public_interface
    path: DokuWiki login and XML-RPC/API access
  - type: artifact
    detail: wiki backups and configuration archives
- id: superuser-and-auth-config
  name: Superuser / Auth Plugin Credential
  description: DokuWiki configuration can define superuser identities and external auth plugin
    settings such as LDAP bind DN/password, database credentials, or SSO shared secrets.
  type: secret_value
  nature:
  - user_defined
  sensitivity: secret
  looks_like:
  - pattern: \$conf\[\'superuser\'\]\s*=\s*[\'\"][^\'\"]+[\'\"]
    detail: DokuWiki superuser setting; identity is not a password but marks privileged accounts
  - pattern: \$conf\[[\'\"][^\'\"]*(pass|password|secret)[^\'\"]*[\'\"]\]\s*=\s*[\'\"][^\'\"]+[\'\"]
    detail: DokuWiki config setting carrying a password or secret
  location:
  - type: config_file
    path: conf/local.php, conf/plugins.local.php
    detail: superuser, auth plugin, LDAP, database, SMTP, and integration settings
  - type: secret_store
    detail: deployment vaults and password managers
  - type: source_code
    detail: configuration management repos and Docker Compose files
  - type: logs
    detail: auth plugin debug logs and web server traces
- id: rememberme-session-cookie
  name: Remember-Me / Session Cookie
  description: DokuWiki browser sessions and remember-me cookies can act as bearer credentials
    for a logged-in user while valid.
  type: token
  nature:
  - generated_on_install
  sensitivity: secret
  location:
  - type: http_header
    path: Cookie
    detail: DokuWiki session and remember-me cookies
  - type: http_response
    path: Set-Cookie
    detail: login/session cookies returned by DokuWiki
  - type: logs
    detail: HTTP debug traces and reverse proxy logs
references:
- type: docs
  url: https://www.dokuwiki.org/config:superuser
- type: docs
  url: https://www.dokuwiki.org/devel:auth_plugins
- type: docs
  url: https://github.com/dokuwiki/dokuwiki/blob/master/conf/users.auth.php.dist

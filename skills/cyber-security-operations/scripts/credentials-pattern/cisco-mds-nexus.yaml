id: cisco-mds-nexus
name: Cisco MDS / Nexus Switch
category: network
vendor: Cisco
author: haxxm0nkey
credentials:
- id: local-admin-password
  name: Local Administrator/User Password
  description: Cisco MDS and Nexus NX-OS switches use local users for console, SSH, Telnet
    where enabled, NX-API, and management access. Initial setup requires creating or setting
    the admin password.
  type: username_password
  nature:
  - user_defined
  - generated_on_install
  sensitivity: secret
  looks_like:
  - pattern: ^username \S+ password (5|8|9|0)? ?[^\r\n]+
    detail: NX-OS local user password line in configuration
  - pattern: ^username \S+ role \S+
    detail: NX-OS local user role assignment line near credential configuration
  location:
  - type: config_file
    detail: running-config/startup-config user and AAA configuration
  - type: public_interface
    path: console, SSH, NX-API, HTTPS, and management VRF services
  - type: artifact
    detail: configuration backups, tech-support bundles, and golden configs
  - type: source_code
    detail: network automation templates and lab configs
  notes: No universal Nexus/MDS admin password is modeled; platforms prompt for an admin password
    during first boot or setup.
- id: nx-api-token-cookie
  name: NX-API Session Cookie / Token
  description: NX-OS NX-API and RESTCONF-style clients authenticate over HTTPS and may use
    Basic credentials, cookies, or session tokens for automation.
  type: token
  nature:
  - generated_on_install
  - user_defined
  sensitivity: secret
  location:
  - type: http_header
    path: Authorization
    detail: Basic or token-style credentials used by NX-API clients
  - type: http_header
    path: Cookie
    detail: NX-API web/API session cookie
  - type: config_file
    detail: Ansible, Terraform, Nornir, and custom automation configs
  - type: environment
    path: NXOS_USERNAME, NXOS_PASSWORD, NXAPI_TOKEN
  - type: secret_store
    detail: CI/CD variables and network automation vaults
  - type: logs
    detail: NX-API HTTP traces and automation debug logs
- id: aaa-snmp-secrets
  name: AAA / SNMP Shared Secrets
  description: NX-OS configurations store RADIUS/TACACS+ shared keys, LDAP integration settings,
    SNMP communities/users, and local fallback credentials.
  type: secret_value
  nature:
  - user_defined
  sensitivity: secret
  looks_like:
  - pattern: ^\s*(radius-server|tacacs-server) key (0|7|6)? ?[^\r\n]+
    detail: NX-OS AAA server shared key line
  - pattern: ^snmp-server community \S+
    detail: SNMPv1/v2c community string line in NX-OS configuration
  location:
  - type: config_file
    detail: NX-OS AAA, SNMP, and management configuration
  - type: artifact
    detail: configuration backups, checkpoint archives, and tech-support files
  - type: source_code
    detail: network-as-code repositories and monitoring templates
- id: fc-vsan-and-ipsec-secrets
  name: Fibre Channel, FCSP, and IPsec Secrets
  description: Cisco MDS/Nexus storage/network configurations can include Fibre Channel Security
    Protocol credentials, DH-CHAP secrets, IPsec/IKE pre-shared keys, and routing protocol
    authentication keys.
  type: secret_value
  nature:
  - user_defined
  sensitivity: secret
  looks_like:
  - pattern: (dhchap|fcsp|key-chain|pre-shared-key|isakmp key)
    detail: NX-OS/MDS config fragments indicating FCSP, routing, or VPN shared secret context
  location:
  - type: config_file
    detail: MDS FCSP/DH-CHAP, VSAN, key-chain, routing, and crypto configuration
  - type: artifact
    detail: fabric configuration backups and migration bundles
  - type: secret_store
    detail: network automation vaults and storage fabric password stores
references:
- type: docs
  url: https://www.cisco.com/c/en/us/td/docs/switches/datacenter/sw/9_x/nx-os/security/configuration/guide/b-cisco-nexus-9000-nx-os-security-configuration-guide-93x.html
- type: docs
  url: https://www.cisco.com/c/en/us/td/docs/switches/datacenter/mds9000/sw/8_x/config/security/cisco_mds9000_security_config_guide_8x.html

id: kubernetes-dashboard-kubelet
name: Kubernetes Dashboard / kubelet
category: ci_cd
vendor: Kubernetes
author: haxxm0nkey
credentials:
- id: kubelet-anonymous-access
  name: kubelet Anonymous / Read-Only Access
  description: kubelet can be configured to allow anonymous requests or expose read-only/metrics
    endpoints depending on Kubernetes version and flags. When enabled or left exposed, some
    node information, metrics, logs, or pod-related endpoints may be reachable without presenting
    a bearer token or client certificate.
  type: username_password
  nature:
  - unauthenticated_default
  sensitivity: secret
  default:
    username: null
    password: null
  location:
  - type: public_interface
    path: kubelet HTTPS :10250 and legacy read-only :10255 endpoints
    detail: node kubelet API, metrics, pods, logs, stats, or read-only endpoints when anonymous/read-only
      access is enabled
  - type: config_file
    path: kubelet config.yaml, kubelet flags, node systemd units
    detail: anonymous.authentication.enabled, authorization.mode, readOnlyPort, clientCAFile,
      and webhook authn/authz settings control access
  - type: logs
    detail: kubelet startup logs and apiserver audit/node proxy logs showing anonymous or
      unauthenticated requests
  notes: This is config-dependent and represents absence of kubelet credential enforcement
    for specific endpoints, not a credential value. Impact depends on anonymous auth, authorization
    mode, readOnlyPort, network reachability, client certificate settings, and Kubernetes
    version.
- id: dashboard-service-account-token
  name: Kubernetes Dashboard ServiceAccount Token
  description: Kubernetes Dashboard authenticates users with bearer tokens, commonly service
    account tokens or kubeconfig-derived tokens. High-privilege dashboard tokens can provide
    broad cluster access.
  type: token
  nature:
  - generated_on_install
  - user_defined
  sensitivity: secret
  looks_like:
  - pattern: eyJ[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+
    detail: JWT-style Kubernetes service account token accepted by Dashboard or apiserver
  location:
  - type: http_header
    path: Authorization
    detail: Bearer token submitted to Dashboard or Kubernetes API
  - type: secret_store
    detail: Kubernetes service account token Secrets, projected token volumes, and external
      vaults
  - type: config_file
    path: kubeconfig, dashboard manifests, serviceaccount token files
    detail: dashboard auth token and kubeconfig context material
  - type: source_code
    detail: cluster bootstrap repos, Helm values, and lab manifests
  - type: logs
    detail: Dashboard logs, apiserver audit logs, and proxy traces
- id: kubeconfig-client-certificate
  name: kubeconfig Client Certificate / Key
  description: Dashboard users, kubectl clients, and automation may authenticate with kubeconfig
    files containing client certificates, private keys, bearer tokens, or exec-plugin credentials.
  type: key_pair
  nature:
  - generated_on_install
  - user_defined
  sensitivity: secret
  looks_like:
  - pattern: client-key-data:\s+[A-Za-z0-9+/=]+
    detail: base64-encoded Kubernetes kubeconfig client private key field
  - pattern: '-----BEGIN (RSA |EC |OPENSSH |ENCRYPTED |)PRIVATE KEY-----'
    detail: client private key material used by Kubernetes kubeconfig authentication
  location:
  - type: config_file
    path: ~/.kube/config, kubeconfig
    detail: clusters, users, tokens, client certs, and private keys
  - type: secret_store
    detail: Kubernetes Secrets, CI/CD variables, and workstation credential stores
  - type: source_code
    detail: accidentally committed kubeconfigs and cluster automation repos
  - type: artifact
    detail: support bundles, cluster backups, and exported admin configs
- id: kubelet-client-cert-and-token
  name: kubelet Client Certificate / Bearer Token
  description: kubelet HTTPS endpoints can require client certificates or bearer tokens. Nodes
    also store kubelet client credentials used to talk to the apiserver.
  type: key_pair
  nature:
  - generated_on_install
  - user_defined
  sensitivity: secret
  looks_like:
  - pattern: '-----BEGIN (RSA |EC |ENCRYPTED |)PRIVATE KEY-----'
    detail: kubelet client/server private key material
  location:
  - type: public_interface
    path: kubelet HTTPS API, metrics, logs, exec/portforward-related endpoints, and node proxy
      paths
  - type: config_file
    path: /var/lib/kubelet/pki/, /var/lib/kubelet/kubeconfig
    detail: kubelet client certificate, server certificate, and kubeconfig credentials
  - type: secret_store
    detail: node filesystem credential stores and cluster PKI backups
  - type: logs
    detail: kubelet logs, apiserver audit logs, and node diagnostics
- id: dashboard-csrf-cookie-session
  name: Dashboard Session / CSRF Cookie
  description: Kubernetes Dashboard browser sessions use cookies and CSRF/session state that
    can act as bearer material while valid.
  type: token
  nature:
  - generated_on_install
  sensitivity: secret
  location:
  - type: http_header
    path: Cookie
    detail: Dashboard browser session cookies
  - type: http_header
    path: X-CSRF-TOKEN
    detail: Dashboard CSRF token for mutating requests
  - type: http_response
    path: Set-Cookie
    detail: Dashboard session cookies returned by the web UI
  - type: logs
    detail: browser traces, reverse proxy logs, and Dashboard debug logs
- id: cluster-admin-rbac-secret
  name: Cluster Admin RBAC Binding Secret
  description: Dashboard deployments sometimes bind a service account to cluster-admin for
    convenience. The credential is the service account token or kubeconfig tied to that RBAC
    binding.
  type: token
  nature:
  - user_defined
  - generated_on_install
  sensitivity: secret
  location:
  - type: config_file
    detail: ClusterRoleBinding, ServiceAccount, Secret, and Helm values granting Dashboard
      permissions
  - type: secret_store
    detail: Kubernetes Secrets and projected service account token volumes
  - type: source_code
    detail: lab manifests and admin dashboard installation snippets
  - type: logs
    detail: apiserver audit records showing Dashboard service account use
  notes: The RBAC binding is not itself secret, but it identifies which token/kubeconfig has
    cluster-admin blast radius.
references:
- type: docs
  url: https://kubernetes.io/docs/tasks/access-application-cluster/web-ui-dashboard/
- type: docs
  url: https://kubernetes.io/docs/reference/access-authn-authz/authentication/
- type: docs
  url: https://kubernetes.io/docs/reference/access-authn-authz/kubelet-authn-authz/

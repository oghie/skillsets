id: atlassian-crowd
name: Atlassian Crowd
category: identity
vendor: Atlassian
author: haxxm0nkey

credentials:

  - id: database-password
    name: Database Password
    description: >
      Crowd stores configuration in crowd.cfg.xml in the Crowd home
      directory. The file includes database connection properties such as the
      database username and password used by Crowd to connect to its
      relational database.
    type: username_password
    nature: [user_defined]
    sensitivity: secret
    looks_like:
      - pattern: '<property name="hibernate\.connection\.username">[^<]+</property>\s*<property name="hibernate\.connection\.password">[^<]*</property>'
        detail: >
          crowd.cfg.xml database credential pair; values are arbitrary
          operator-supplied strings
      - pattern: '<property name="hibernate\.connection\.password">[^<]*</property>'
        detail: >
          database password property in crowd.cfg.xml; the password itself
          has no Crowd-specific textual shape
    location:
      - type: config_file
        path: $CROWD_HOME/crowd.cfg.xml
        detail: Crowd home configuration file generated by the setup wizard
      - type: build_artifact
        detail: Crowd home backups, migration bundles, snapshots, support exports
    notes: >
      Crowd is an identity service. Database access can expose user
      directory configuration, application trust configuration, groups,
      memberships, and stored credential metadata for multiple Atlassian
      applications that depend on Crowd.

  - id: local-user-admin-password
    name: Local User / Administrator Password
    description: >
      Crowd internal-directory users, including administrators created during
      setup or by operators, authenticate with passwords stored in Crowd's
      database. External directories can delegate password verification to
      LDAP, Active Directory, or other directory connectors.
    type: username_password
    nature: [user_defined]
    sensitivity: secret
    looks_like:
      - pattern: 'cwd_user.*credential'
        detail: >
          internal-directory password material in Crowd user tables; the
          value has no Crowd-specific textual prefix and is identified by
          table and column context
      - pattern: '[^\s:@]+:[^\s:]+'
        detail: >
          raw Basic-auth username:password form before Base64 encoding;
          request context identifies Crowd
    location:
      - type: database
        detail: Crowd internal directory tables, including cwd_user credential data
      - type: public_interface
        path: /crowd/console/login.action
        detail: Crowd administration console login
      - type: public_interface
        detail: Crowd REST API and application authentication flows
      - type: source_code
        detail: scripts and service integrations that embed Crowd usernames and passwords
    notes: >
      There is no universal shipped Crowd administrator password. The setup
      flow or an operator creates administrator credentials. Users may be
      stored locally in Crowd or resolved from delegated directories, so the
      storage location depends on directory configuration.

  - id: application-password
    name: Application Password
    description: >
      Crowd applications authenticate to the Crowd framework as clients using
      an application name and password. Atlassian's application setup wizard
      explicitly asks for the password the application will use when it
      authenticates against Crowd.
    type: username_password
    nature: [user_defined]
    sensitivity: secret
    looks_like:
      - pattern: '(application\.name|application\.password|crowd\.application\.name|crowd\.application\.password)\s*=\s*[^\r\n]+'
        detail: >
          application connector property used by Atlassian applications and
          custom clients; the password value is arbitrary
      - pattern: '<password>[^<]*</password>'
        detail: >
          application password element in exported or database-backed Crowd
          application configuration; surrounding application context is
          required
    location:
      - type: database
        detail: Crowd application records and application password storage
      - type: config_file
        detail: client application crowd.properties or equivalent connector config
      - type: source_code
        detail: application deployment templates, containers, and automation repos
      - type: build_artifact
        detail: application backups and Crowd database dumps
    notes: >
      This is a service-to-service credential rather than a human login. A
      leaked application password can let a client impersonate a configured
      application to Crowd, subject to the application's remote-address and
      directory permissions.

  - id: directory-bind-password
    name: LDAP / Directory Bind Password
    description: >
      Crowd directory connectors can authenticate to LDAP, Active Directory,
      and other external directories using a bind account and password. The
      bind credential lets Crowd search or update the external directory
      according to connector permissions.
    type: username_password
    nature: [user_defined]
    sensitivity: secret
    looks_like:
      - pattern: '(ldap|directory|connector).*(password|credential)'
        detail: >
          directory connector password field in Crowd configuration or
          database exports; exact values are arbitrary and identified by
          connector context
    location:
      - type: database
        detail: Crowd directory connector configuration records
      - type: config_file
        detail: exported or templated directory connector configuration
      - type: build_artifact
        detail: Crowd database backups, migration bundles, and support exports
    notes: >
      Bind-account blast radius depends on the external directory. A
      read-only LDAP bind may expose account and group data; a privileged
      bind may support password changes or directory modification.

  - id: personal-access-token
    name: Personal Access Token
    description: >
      Newer Crowd Data Center versions support personal access tokens for
      users and scripts. Like other Atlassian Data Center PATs, they are
      bearer credentials used instead of embedding a username and password.
    type: token
    nature: [user_defined]
    sensitivity: secret
    looks_like:
      - pattern: 'Authorization:\s*Bearer\s+[^\s]+'
        detail: >
          no documented Crowd-specific token prefix; identify PATs by
          Bearer-token use against Crowd endpoints
    location:
      - type: environment
        path: CROWD_TOKEN, CROWD_PAT
      - type: source_code
        detail: REST scripts, provisioning tools, directory sync automation
      - type: logs
        detail: HTTP client debug logs when Authorization headers are printed
      - type: secret_store
        detail: CI/CD variables and service secret stores
    notes: >
      A PAT carries the permissions of the creating user until expiration or
      revocation. If a Crowd PAT is not available in a deployed version,
      integrations typically fall back to username/password or application
      credentials.

  - id: pdkinstall-development-plugin
    name: pdkinstall Development Plugin
    description: >
      A Crowd security advisory describes CVE-2019-11580, where the
      pdkinstall development plugin was incorrectly enabled in Crowd and
      Crowd Data Center. The issue is a public backdoor-like administrative
      exposure, but it is not a literal shipped password.
    type: other
    nature: [undocumented]
    sensitivity: secret
    looks_like:
      - pattern: 'pdkinstall'
        detail: >
          plugin name from the Crowd advisory; included as a backdoor marker
          rather than a token or password specimen
    location:
      - type: public_interface
        detail: affected Crowd web application exposing the development plugin
    notes: >
      Do not add a default username or password for this issue: the advisory
      and CVE document an incorrectly enabled development plugin, not a
      literal credential. It is included because it is a known public
      backdoor-style Crowd exposure relevant to credential and identity
      compromise triage.

references:

  - type: docs
    url: https://confluence.atlassian.com/crowd/creating-a-new-application-application-details-18579597.html
  - type: docs
    url: https://confluence.atlassian.com/crowd/configuring-an-application-18579579.html
  - type: advisory
    url: https://confluence.atlassian.com/crowd/crowd-security-advisory-2019-05-22-970260700.html
  - type: cve

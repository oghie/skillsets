id: pfsense
name: pfSense
category: network
vendor: Netgate
author: haxxm0nkey
credentials:
- id: default-admin
  name: Default Administrator Login
  description: pfSense ships with an initial webConfigurator/console administrator credential
    that should be changed during the setup wizard.
  type: username_password
  nature:
  - static_default
  - user_defined
  sensitivity: secret
  default:
    username: admin
    password: pfsense
  location:
  - type: public_interface
    path: pfSense webConfigurator, SSH/console shell, XMLRPC, and API packages where installed
  - type: config_file
    path: /conf/config.xml
    detail: local user password hashes and system configuration
  - type: artifact
    detail: configuration backups and diagnostics bundles
- id: local-user-password
  name: Local User Password Hash
  description: pfSense local users and privilege assignments are stored in the XML configuration
    and used for webConfigurator, SSH, VPN, captive portal, and package access.
  type: username_password
  nature:
  - user_defined
  sensitivity: secret
  looks_like:
  - pattern: <user>.*?<name>[^<]+</name>.*?<password>[^<]+</password>
    detail: pfSense config.xml user entry containing username and password hash
  location:
  - type: config_file
    path: /conf/config.xml
    detail: user manager entries, password hashes, privileges, and auth server config
  - type: public_interface
    path: webConfigurator, SSH, console, VPN, captive portal, and package UIs
  - type: secret_store
    detail: password managers and firewall backup vaults
  - type: logs
    detail: system, auth, VPN, and captive portal logs
- id: api-key-and-session
  name: API Key / Web Session Cookie
  description: pfSense installations with REST/API packages or automation can use API keys,
    Basic auth, and PHP/webConfigurator session cookies as bearer credentials.
  type: api_key
  nature:
  - generated_on_install
  - user_defined
  sensitivity: secret
  location:
  - type: http_header
    path: Authorization
    detail: Basic or bearer/API-key auth used by automation and API packages
  - type: http_header
    path: Cookie
    detail: pfSense webConfigurator PHP session cookie
  - type: config_file
    detail: automation scripts, Terraform/Ansible configs, and API package settings
  - type: secret_store
    detail: CI/CD variables and network automation vaults
  - type: logs
    detail: web server access logs and API debug traces
- id: vpn-snmp-ldap-radius-secrets
  name: VPN, SNMP, LDAP, RADIUS, and Certificate Secrets
  description: pfSense configurations hold IPsec/OpenVPN/WireGuard keys, SNMP communities,
    LDAP/RADIUS secrets, certificates/private keys, PPPoE credentials, and package integration
    secrets.
  type: secret_value
  nature:
  - user_defined
  - generated_on_install
  sensitivity: secret
  looks_like:
  - pattern: '-----BEGIN (RSA |EC |OPENVPN |ENCRYPTED |)PRIVATE KEY-----'
    detail: private key material from pfSense certificate or VPN exports
  location:
  - type: config_file
    path: /conf/config.xml
    detail: VPN, SNMP, auth server, certificate, gateway, package, and PPP secrets
  - type: secret_store
    detail: configuration backup vaults and certificate stores
  - type: artifact
    detail: full configuration backups, diagnostics, and OpenVPN client exports
  - type: source_code
    detail: firewall-as-code repositories and deployment templates
references:
- type: docs
  url: https://docs.netgate.com/pfsense/en/latest/usermanager/index.html
- type: docs
  url: https://docs.netgate.com/pfsense/en/latest/config/xml-configuration-file.html

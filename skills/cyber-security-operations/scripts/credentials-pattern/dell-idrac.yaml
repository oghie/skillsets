id: dell-idrac
name: Dell iDRAC
category: network
vendor: Dell Technologies
author: haxxm0nkey
credentials:
- id: default-root-calvin
  name: Default root/calvin Login
  description: Many iDRAC generations document a default local account root with password
    calvin, while newer systems may use a unique secure default password printed on the service
    tag or require password changes.
  type: username_password
  nature:
  - static_default
  - generated_on_install
  - user_defined
  sensitivity: secret
  default:
    username: root
    password: calvin
  location:
  - type: public_interface
    path: iDRAC web UI, SSH, Redfish, IPMI, RACADM
    detail: Out-of-band management interfaces
  - type: config_file
    detail: iDRAC configuration exports and server profile XML/JSON
  - type: artifact
    detail: support bundles, deployment profiles, and factory configuration records
  notes: 'Do not assume root/calvin on every Dell server: iDRAC9 and later deployments may
    use a unique secure default password on the chassis tag or enforce password changes.'
- id: local-user-password
  name: Local iDRAC User Password
  description: iDRAC local users authenticate to web, SSH, Redfish, IPMI, and RACADM management
    channels. Passwords and password hashes may appear in configuration exports, deployment
    profiles, or management tooling.
  type: username_password
  nature:
  - user_defined
  - generated_on_install
  sensitivity: secret
  location:
  - type: public_interface
    path: iDRAC web UI / SSH / Redfish / IPMI / RACADM
  - type: config_file
    detail: iDRAC Server Configuration Profile exports and RACADM set commands
  - type: secret_store
    detail: password managers, OpenManage Enterprise templates, and deployment vaults
  - type: source_code
    detail: RACADM scripts, Ansible playbooks, Terraform, and provisioning repos
  - type: logs
    detail: automation logs, RACADM output, and Redfish debug traces
- id: redfish-session-token
  name: Redfish / Web Session Token
  description: iDRAC Redfish and web sessions issue authentication/session tokens for API
    clients. These tokens grant management access for the authenticated user until expiry
    or logout.
  type: token
  nature:
  - generated_on_install
  sensitivity: secret
  location:
  - type: http_header
    path: X-Auth-Token
    detail: Redfish session token returned by SessionService and sent on subsequent requests
  - type: http_response
    path: Location
    detail: Redfish session resource URI returned during login
  - type: config_file
    detail: API client caches, scripts, and .env files
  - type: logs
    detail: HTTP traces and Redfish client debug output
- id: snmp-ipmi-lan-secrets
  name: SNMP / IPMI LAN Secrets
  description: iDRAC can expose SNMP community strings and IPMI-over-LAN user credentials
    for monitoring and remote management.
  type: secret_value
  nature:
  - user_defined
  sensitivity: secret
  location:
  - type: config_file
    detail: iDRAC configuration exports for SNMP, IPMI LAN, and user settings
  - type: public_interface
    path: SNMP and IPMI LAN management services
  - type: source_code
    detail: monitoring configs and provisioning scripts
  - type: artifact
    detail: server configuration profiles and support bundles
references:
- type: docs
  url: https://www.dell.com/support/manuals/en-us/idrac9-lifecycle-controller-v7.x-series/idrac9_7.xx_ug/default-login-password?guid=guid-8983ff4b-05a1-4c99-a5d1-98c1d38ca133&lang=en-us
- type: docs
  url: https://www.dell.com/support/kbdoc/en-us/000178127/how-to-change-the-default-login-password-of-idrac
- type: docs
  url: https://developer.dell.com/apis/2978/versions/7.xx/docs/IdracRedfishSupport.md

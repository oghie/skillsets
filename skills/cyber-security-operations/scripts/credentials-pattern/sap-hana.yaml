id: sap-hana
name: SAP HANA
category: database
vendor: SAP
author: haxxm0nkey
credentials:
- id: system-user-password
  name: SYSTEM / Database User Password
  description: SAP HANA databases use database users such as SYSTEM and application/technical
    users for SQL, administration, and service access. Initial passwords are set during installation
    or provisioning.
  type: username_password
  nature:
  - generated_on_install
  - user_defined
  sensitivity: secret
  location:
  - type: public_interface
    path: SQL clients, HANA Cockpit, Database Explorer, JDBC/ODBC, and hdbsql
  - type: database
    detail: HANA user catalog and password verifier state
  - type: config_file
    detail: hdbuserstore references, deployment descriptors, xs/app configs, and backup scripts
  - type: secret_store
    detail: hdbuserstore, OS credential stores, Kubernetes Secrets, and password vaults
  - type: logs
    detail: indexserver traces, audit logs, installer logs, and client debug logs
  notes: SAP HANA requires the SYSTEM password to be set during installation; no universal
    SYSTEM password is modeled.
- id: hdbuserstore-key
  name: hdbuserstore Secure User Store Key
  description: HANA client tools can store connection credentials in hdbuserstore secure user
    store keys, allowing scripts to connect without plaintext command-line passwords.
  type: secret_value
  nature:
  - user_defined
  sensitivity: secret
  location:
  - type: secret_store
    path: hdbuserstore
    detail: SAP HANA secure user store entries on client or server hosts
  - type: config_file
    detail: scripts and service files referencing hdbuserstore key names
  - type: source_code
    detail: backup, monitoring, and deployment automation
  - type: logs
    detail: hdbsql command traces and failed connection output
- id: xs-uaa-oauth-secret
  name: XS Advanced / UAA OAuth Client Secret
  description: SAP HANA XS Advanced and related services use UAA/OAuth clients, service keys,
    and JWT signing configuration for application and service authentication.
  type: secret_value
  nature:
  - generated_on_install
  - user_defined
  sensitivity: secret
  location:
  - type: http_header
    path: Authorization
    detail: Bearer tokens used by XS Advanced and service APIs
  - type: database
    detail: XSA/UAA service and client credential stores
  - type: config_file
    detail: mta.yaml, xs-security.json, service keys, and app environment files
  - type: environment
    path: VCAP_SERVICES, HANA_CLIENT_SECRET, XSUAA_CLIENT_SECRET
  - type: secret_store
    detail: service keys, Kubernetes Secrets, and external vaults
  - type: source_code
    detail: application repositories and deployment descriptors
  - type: logs
    detail: application startup logs and OAuth debug traces
- id: ssl-pse-private-key
  name: SSL / PSE Private Key
  description: SAP HANA uses certificates and private keys for TLS, internal communication,
    and client authentication.
  type: key_pair
  nature:
  - generated_on_install
  - user_defined
  sensitivity: secret
  looks_like:
  - pattern: '-----BEGIN (RSA |EC |ENCRYPTED |)PRIVATE KEY-----'
    detail: private key material for HANA TLS or client certificate authentication
  location:
  - type: config_file
    detail: HANA certificate stores, PSE/PKCS#12 files, global.ini SSL settings, and client
      key files
  - type: secret_store
    detail: certificate vaults, OS key stores, and backup vaults
  - type: artifact
    detail: system copies, backups, and support archives
- id: backup-encryption-key
  name: Backup Encryption Key / Root Key Material
  description: HANA deployments can use encryption keys for data volume, redo log, and backup
    encryption. Key backups and root keys are sensitive recovery credentials.
  type: secret_value
  nature:
  - generated_on_install
  - user_defined
  sensitivity: secret
  location:
  - type: secret_store
    detail: HANA secure store, external key managers, and backup key vaults
  - type: artifact
    detail: encrypted backup sets, key backups, and recovery bundles
  - type: config_file
    detail: encryption and key management configuration
references:
- type: docs
  url: https://help.sap.com/docs/SAP_HANA_PLATFORM/6b94445c94ae495c83a19646e7c3fd56/c44f922dcb6341df871b62f2f9d5d04a.html
- type: docs
  url: https://help.sap.com/docs/SAP_HANA_PLATFORM/742945a940f240f4a2a0e39f93d3e2d4/7c3d6bb0e57648b596a5d702e2ff5b4d.html

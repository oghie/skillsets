id: apache-activemq
name: Apache ActiveMQ
category: middleware
vendor: Apache Software Foundation
author: haxxm0nkey

credentials:

  - id: jaas-user-password
    name: JAAS User Password
    description: >
      ActiveMQ Classic provides pluggable security and commonly uses JAAS for
      authentication. ActiveMQ documents the PropertiesLoginModule with
      users.properties and groups.properties files for username/password and
      group mapping.
    type: username_password
    nature: [user_defined]
    sensitivity: secret
    looks_like:
      - pattern: '^[^#=\r\n]+\s*=\s*[^\r\n]+$'
        detail: ActiveMQ users.properties username=password entry; context identifies ActiveMQ JAAS users
    location:
      - type: config_file
        path: users.properties, groups.properties, login.config, activemq.xml
        detail: JAAS user/password and group files referenced by ActiveMQ broker configuration
      - type: environment
        path: ACTIVEMQ_USER, ACTIVEMQ_PASSWORD, ACTIVEMQ_ADMIN_LOGIN, ACTIVEMQ_ADMIN_PASSWORD
      - type: secret_store
        detail: Kubernetes Secrets, Docker secrets, cloud secret managers, and deployment vaults
      - type: source_code
        detail: broker configs, Docker Compose files, tests, and committed examples
      - type: logs
        detail: broker authentication failures, startup logs, and CI output
      - type: public_interface
        path: OpenWire 61616, web console
        detail: ActiveMQ broker and management login surfaces
    notes: >
      ActiveMQ credentials may protect broker destinations, JMX, and web console
      access depending on configuration.

  - id: anonymous-access
    name: Anonymous Access Configuration
    description: >
      ActiveMQ can allow anonymous access by setting anonymousAccessAllowed. The
      documentation states that clients connecting without username and password
      are assigned a default anonymous username and group unless changed.
    type: other
    nature: [user_defined]
    sensitivity: context_dependent
    looks_like:
      - pattern: 'anonymousAccessAllowed\s*=\s*["'']?true["'']?'
        detail: ActiveMQ configuration allowing clients without credentials
    location:
      - type: config_file
        path: activemq.xml
        detail: broker authentication plugin configuration
      - type: source_code
        detail: committed broker configs, Helm charts, and Docker Compose files
      - type: image
        detail: container images or VM images containing permissive broker config
    notes: >
      Anonymous access is not a credential, but it creates passwordless broker
      access and should be triaged with network exposure and destination ACLs.

  - id: web-console-password
    name: Web Console Password
    description: >
      ActiveMQ deployments often protect the web console with web application or
      JAAS credentials separate from broker clients. These credentials are stored
      in deployment-specific configuration.
    type: username_password
    nature: [user_defined]
    sensitivity: secret
    location:
      - type: config_file
        detail: jetty-realm.properties, web console config, login.config, and activemq.xml
      - type: public_interface
        path: ActiveMQ web console
        detail: browser-based broker management interface
      - type: secret_store
        detail: deployment vaults, container secrets, and CI/CD variables
      - type: source_code
        detail: committed web console realm files and examples
      - type: logs
        detail: web console authentication logs and startup output
    notes: >
      Do not model admin/admin or other example credentials as universal
      defaults unless a specific package or image source states they ship that way.

references:
  - type: docs
    url: https://activemq.apache.org/security
  - type: docs
    url: https://activemq.apache.org/components/classic/documentation/security

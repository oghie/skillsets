id: oracle-jd-edwards
name: Oracle JD Edwards EnterpriseOne
category: enterprise_app
vendor: Oracle
author: haxxm0nkey
credentials:
- id: jde-demo-user
  name: JDE Demo / Administrative User
  description: JD Edwards EnterpriseOne installations and demo environments commonly include
    delivered administrative users such as JDE that must be changed or disabled during security
    hardening.
  type: username_password
  nature:
  - static_default
  - user_defined
  sensitivity: secret
  default:
    username: JDE
    password: JDE
  location:
  - type: public_interface
    path: EnterpriseOne web client, Server Manager, Orchestrator Studio, and AIS Server
  - type: database
    detail: EnterpriseOne security tables and user profile records
  - type: config_file
    detail: installation workbench outputs, jde.ini, jas.ini, and provisioning notes
  - type: logs
    detail: security server, web client, AIS, and Server Manager logs
  notes: JDE/JDE is modeled as a delivered/demo credential pattern; hardened production environments
    should not retain it.
- id: enterpriseone-user-password
  name: EnterpriseOne User Password
  description: JD Edwards users and service accounts authenticate through EnterpriseOne security
    for web, fat client, batch, AIS, and orchestrations.
  type: username_password
  nature:
  - user_defined
  - generated_on_install
  sensitivity: secret
  location:
  - type: database
    detail: EnterpriseOne security and user profile tables containing credential/verifier
      state
  - type: public_interface
    path: EnterpriseOne web/fat client, AIS REST, Orchestrator, and Server Manager
  - type: config_file
    detail: jde.ini, jas.ini, server manager config, and datasource settings
  - type: secret_store
    detail: password vaults and deployment stores
  - type: logs
    detail: JAS, security server, batch, and AIS logs
- id: database-and-datasource-secret
  name: Database / Data Source Credential
  description: EnterpriseOne data sources and middleware components store database, LDAP,
    mail, and integration credentials used by kernels, batch jobs, and AIS/orchestrations.
  type: secret_value
  nature:
  - user_defined
  - generated_on_install
  sensitivity: secret
  location:
  - type: config_file
    detail: jde.ini, jas.ini, jdbj.ini, tnsnames, JDBC datasource config, and Server Manager
      plans
  - type: database
    detail: EnterpriseOne datasource, OCM, security, and orchestration configuration records
  - type: secret_store
    detail: Oracle wallets, password vaults, and platform credential stores
  - type: source_code
    detail: orchestration exports, deployment scripts, and integration configs
  - type: logs
    detail: kernel, JAS, AIS, and database connection logs
- id: certificate-and-keystore-secret
  name: AIS / WebLogic Certificate and Keystore Secret
  description: JD Edwards web tiers and AIS use TLS certificates, keystores, and WebLogic
    or application server secrets for secure communication.
  type: key_pair
  nature:
  - generated_on_install
  - user_defined
  sensitivity: secret
  looks_like:
  - pattern: '-----BEGIN (RSA |EC |ENCRYPTED |)PRIVATE KEY-----'
    detail: private key material for JD Edwards web/AIS TLS or client certificate authentication
  location:
  - type: config_file
    detail: WebLogic domain config, Java keystores, SSL files, and Server Manager settings
  - type: secret_store
    detail: keystores, certificate vaults, and deployment secrets
  - type: artifact
    detail: Server Manager backups and support bundles
references:
- type: docs
  url: https://docs.oracle.com/en/applications/jd-edwards/administration/9.2.x/eotsa/index.html
- type: docs
  url: https://docs.oracle.com/en/applications/jd-edwards/administration/9.2.x/eotsc/index.html

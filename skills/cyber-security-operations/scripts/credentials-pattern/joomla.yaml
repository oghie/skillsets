id: joomla
name: Joomla
category: cms
vendor: Open Source Matters
author: haxxm0nkey

credentials:

  - id: database-credentials
    name: Database Credentials
    description: >
      Joomla stores site configuration in configuration.php. Database connection
      settings in that file commonly include host, user, password, database, and
      prefix values used by the CMS.
    type: username_password
    nature: [user_defined]
    sensitivity: secret
    looks_like:
      - pattern: 'public\s+\$password\s*=\s*[^;\r\n]+;'
        detail: Joomla configuration.php database password property
    location:
      - type: config_file
        path: configuration.php
        detail: Joomla site configuration containing database credentials and secrets
      - type: environment
        path: JOOMLA_DB_USER, JOOMLA_DB_PASSWORD, JOOMLA_DB_HOST, JOOMLA_DB_NAME
      - type: secret_store
        detail: hosting secrets, Docker/Kubernetes secrets, cloud secret managers, and CI/CD variables
      - type: source_code
        detail: accidentally committed configuration.php files, deployment scripts, and backups
      - type: artifact
        detail: site archives, webroot backups, and container images
      - type: logs
        detail: installer logs, support bundles, and debug output
    notes: >
      Database credentials can expose Joomla users, password hashes, content,
      extensions, and site configuration stored in the database.

  - id: site-secret
    name: Site Secret
    description: >
      Joomla configuration includes secret site material used by the application
      for session and token protection. Exposure of configuration.php can reveal
      the secret alongside database credentials.
    type: secret_value
    nature: [generated_on_install]
    sensitivity: secret
    looks_like:
      - pattern: 'public\s+\$secret\s*=\s*[^;\r\n]+;'
        detail: Joomla configuration.php secret property
    location:
      - type: config_file
        path: configuration.php
        detail: Joomla site secret and runtime configuration
      - type: source_code
        detail: committed site configuration, examples, and backups
      - type: artifact
        detail: site archives and container images containing configuration.php
      - type: secret_store
        detail: managed hosting and deployment secrets
    notes: >
      The secret is not a login password but should be treated as site-specific
      secret material.

  - id: administrator-password
    name: Administrator/User Password
    description: >
      Joomla administrator accounts authenticate to the administrator interface
      with user-defined passwords. The initial administrator account is created
      during installation.
    type: username_password
    nature: [user_defined]
    sensitivity: secret
    location:
      - type: database
        detail: Joomla users table containing account data and password hashes
      - type: public_interface
        path: /administrator
        detail: Joomla administrator login interface
      - type: source_code
        detail: installation scripts, test fixtures, and accidentally committed credentials
      - type: logs
        detail: web server logs, failed login traces, and support bundles
    notes: >
      Joomla does not have a universal administrator password; default-like
      credentials belong to specific installers or images if separately sourced.

references:
  - type: docs
    url: https://manual.joomla.org/docs/security/
  - type: docs
    url: https://docs.joomla.org/Configuration.php

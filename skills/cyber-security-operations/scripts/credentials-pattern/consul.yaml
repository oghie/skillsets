id: consul
name: HashiCorp Consul
category: other
vendor: HashiCorp
author: haxxm0nkey
credentials:
- id: unauthenticated-default
  name: Unauthenticated HTTP/DNS/Service Discovery Access
  description: Consul ACL enforcement is disabled until ACLs are enabled and bootstrapped.
    In ACL-disabled deployments, HTTP API, DNS, service catalog, health, and KV access can
    be available without an ACL token depending on listener exposure.
  type: username_password
  nature:
  - unauthenticated_default
  sensitivity: secret
  default:
    username: null
    password: null
  location:
  - type: public_interface
    path: Consul HTTP API :8500, DNS :8600, gRPC/API listeners
    detail: Consul service discovery, catalog, health, KV, and agent endpoints when ACLs are
      disabled
  - type: config_file
    path: /etc/consul.d/*.hcl, consul.hcl
    detail: acl.enabled, default_policy, tokens, addresses, ports, and bind/client_addr settings
      control no-auth exposure
  - type: logs
    detail: Consul agent startup logs and ACL bootstrap/status output
  notes: This represents no ACL token requirement, not a credential value. Impact depends
    on whether ACLs are enabled, default policy, bind/client addresses, mesh exposure, and
    network filtering.
- id: acl-token
  name: Consul ACL Token
  description: Consul ACL tokens authorize service discovery, KV, intentions, service mesh,
    and administrative operations. Bootstrap and management tokens are especially sensitive.
  type: token
  nature:
  - generated_on_install
  - user_defined
  sensitivity: secret
  looks_like:
  - pattern: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$
    detail: UUID-style Consul ACL token secret commonly emitted by bootstrap/token create
      commands
  location:
  - type: http_header
    path: X-Consul-Token
    detail: Consul HTTP API ACL token header
  - type: config_file
    path: /etc/consul.d/*.hcl, consul.hcl
    detail: agent tokens, default tokens, replication tokens, and ACL configuration
  - type: environment
    path: CONSUL_HTTP_TOKEN, CONSUL_HTTP_AUTH
  - type: secret_store
    detail: Vault, Kubernetes Secrets, Nomad variables, and CI/CD secret stores
  - type: source_code
    detail: Terraform providers, deployment repos, Helm values, and integration tests
  - type: logs
    detail: agent logs, API traces, and bootstrap command output
- id: gossip-encryption-key
  name: Gossip Encryption Key
  description: Consul agents can use a shared gossip encryption key to protect LAN/WAN gossip
    traffic. The key is a cluster-wide secret distributed to agents.
  type: secret_value
  nature:
  - generated_on_install
  - user_defined
  sensitivity: secret
  looks_like:
  - pattern: ^[A-Za-z0-9+/]{32,}={0,2}$
    detail: base64-like Consul gossip encryption key generated by consul keygen; context identifies
      the value
  location:
  - type: config_file
    path: /etc/consul.d/*.hcl
    detail: encrypt setting and keyring material
  - type: environment
    path: CONSUL_ENCRYPT
  - type: secret_store
    detail: Kubernetes Secrets, Vault, Nomad variables, and configuration vaults
  - type: source_code
    detail: cluster bootstrap scripts and IaC modules
  - type: logs
    detail: agent startup logs and debug output
- id: tls-cert-and-private-key
  name: TLS Certificate / Private Key
  description: Consul can use TLS for RPC, HTTPS API, and mTLS between agents. Private keys
    and CA material authenticate agents and clients.
  type: key_pair
  nature:
  - generated_on_install
  - user_defined
  sensitivity: secret
  looks_like:
  - pattern: '-----BEGIN (RSA |EC |ENCRYPTED |)PRIVATE KEY-----'
    detail: private key material for Consul agent, server, client, or CA TLS authentication
  location:
  - type: config_file
    path: /etc/consul.d/, /opt/consul/tls/
    detail: TLS cert_file, key_file, ca_file, and auto-encrypt settings
  - type: secret_store
    detail: Vault PKI, Kubernetes Secrets, and certificate stores
  - type: artifact
    detail: cluster backups, support bundles, and exported CA material
- id: service-mesh-and-integration-secrets
  name: Service Mesh, KV, and Integration Secrets
  description: Consul deployments may store service mesh certificates, Connect CA keys, Consul
    KV secrets, cloud auto-join credentials, and integration tokens.
  type: secret_value
  nature:
  - generated_on_install
  - user_defined
  sensitivity: secret
  location:
  - type: database
    detail: Consul state store, KV entries, ACL policies, and Connect CA state
  - type: config_file
    detail: agent configs, service definitions, cloud auto-join settings, and sync integrations
  - type: secret_store
    detail: Vault, Kubernetes Secrets, and external secret stores
  - type: logs
    detail: Connect, ACL, federation, and sync logs
references:
- type: docs
  url: https://developer.hashicorp.com/consul/docs/security/acl
- type: docs
  url: https://developer.hashicorp.com/consul/docs/security/encryption
- type: docs
  url: https://developer.hashicorp.com/consul/docs/security/tls

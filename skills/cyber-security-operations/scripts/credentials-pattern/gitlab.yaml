id: gitlab
name: GitLab
category: ci_cd
vendor: GitLab Inc.
author: haxxm0nkey

credentials:

  - id: initial-root-password
    name: Initial Root Password
    description: >
      Omnibus and Docker GitLab generate a random root password on first
      boot and write it to /etc/gitlab/initial_root_password. The file is
      auto-deleted 24 hours after install.
    type: password
    nature: [generated_on_install]
    sensitivity: secret
    looks_like:
      - pattern: '^Password:\s+\S+$'
        detail: >
          line inside the initial_root_password file; the value itself is
          per-install and has no fixed shape
    location:
      - type: config_file
        path: /etc/gitlab/initial_root_password
      - type: logs
        detail: container / journald output on first boot in some deployments
    notes: >
      Auto-deletion at 24 h is a mitigation, not a guarantee — it removes
      the file, not any access already captured, and not the account itself
      if never secured. The initial_root_password value can also be
      pre-set via gitlab_rails['initial_root_password'] in /etc/gitlab/gitlab.rb,
      which means the same value can leak from a plaintext gitlab.rb backup.

  - id: gitlab-rb-secrets
    name: gitlab.rb Configuration Secrets
    description: >
      The Omnibus main config file /etc/gitlab/gitlab.rb stores multiple
      secrets in plaintext: initial_root_password, database password
      (gitlab_rails['db_password']), initial_shared_runners_registration_token,
      Redis password, SMTP credentials, LDAP bind password, and more. The
      vendor explicitly documents that this file "should have file
      permissions 0600 because it contains plain-text passwords."
    type: secret_value
    nature: [user_defined]
    sensitivity: secret
    looks_like:
      - pattern: "gitlab_rails\\['(db_password|initial_root_password|initial_shared_runners_registration_token)'\\]\\s*=\\s*'[^']+'"
        detail: >
          plaintext assignment in gitlab.rb; the value inside the quotes
          is the credential (Ruby DSL assignment; shape of the value is
          arbitrary)
      - pattern: "postgresql\\['sql_user_password'\\]\\s*=\\s*'[a-f0-9]{32}'"
        detail: MD5-hashed Postgres password (still directly usable with the DB)
    location:
      - type: config_file
        path: /etc/gitlab/gitlab.rb
        detail: main Omnibus configuration; 0600 by design, world-readable in backups
      - type: build_artifact
        detail: gitlab-ctl backup-etc archives, config-management output, snapshots
    notes: >
      This is the single highest-value file on a GitLab host — one read
      hands you the DB password, the Rails-seeded root credential, and
      any pre-set runner registration tokens. Frequently exposed via
      misconfigured backups, config-management repos, and container images
      built with the file baked in.

  - id: gitlab-secrets-json
    name: Rails Encryption Secrets (gitlab-secrets.json)
    description: >
      /etc/gitlab/gitlab-secrets.json holds the Rails secret_key_base,
      db_key_base, and OTP/OpenID signing keys. These keys decrypt every
      encrypted value in the GitLab database — including stored CI/CD
      variables, integrations, and personal access tokens.
    type: secret_value
    nature: [generated_on_install]
    sensitivity: secret
    looks_like:
      - pattern: '"(secret_key_base|db_key_base|otp_key_base)":\s*"[a-f0-9]{64,}"'
        detail: >
          JSON key/value pair; 64+ char hex value is the credential
          (config-file secret pattern — the key name identifies it)
    location:
      - type: config_file
        path: /etc/gitlab/gitlab-secrets.json
      - type: build_artifact
        detail: gitlab-ctl backup-etc archives include this file
    notes: >
      Losing this file is worse than losing an admin session — it lets
      an attacker decrypt every stored secret offline, including secrets
      belonging to users who never logged in through the attacker's access.
      Must be backed up separately from the DB backup, and consequently is
      often stored insecurely by operators who don't understand its role.

  - id: default-db-user
    name: Bundled PostgreSQL User
    description: >
      The Omnibus package's bundled PostgreSQL is created with the
      username 'gitlab' by default. Password is set via
      postgresql['sql_user_password'] (MD5-encoded) and consumed by
      gitlab_rails['db_password'] (plaintext).
    type: username_password
    nature: [static_default]
    sensitivity: context_dependent
    default:
      username: gitlab
      password: null
      affected_versions: "Omnibus (all)"
    location:
      - type: config_file
        path: /etc/gitlab/gitlab.rb
        detail: postgresql['sql_user_password'] and gitlab_rails['db_password']
      - type: database
        detail: bundled Postgres, TCP 5432 (localhost by default)
    notes: >
      The bundled Postgres binds to localhost with peer/trust auth by
      default, so the username being "gitlab" isn't exploitable on its own —
      but the moment listen_address is changed for HA or external access,
      the known username plus a leaked gitlab.rb (see gitlab-rb-secrets)
      gives direct DB access. The DB holds every stored token in
      encrypted form; combined with gitlab-secrets.json it's a full
      offline compromise.

  - id: personal-access-token
    name: Personal / Project / Group Access Token
    description: >
      GitLab's family of user-scoped tokens all share the glpat- prefix:
      personal access tokens, impersonation tokens, project access tokens,
      and group access tokens.
    type: token
    nature: [user_defined]
    sensitivity: secret
    looks_like:
      - example: 'glpat-XXXXXXXXXXXXXXXXXXXX'
        pattern: 'glpat-[A-Za-z0-9_\-]{20,}'
    location:
      - type: source_code
        detail: git remote URLs, CI config, committed .env files
      - type: environment
        path: GITLAB_TOKEN, CI_JOB_TOKEN, PRIVATE_TOKEN
    notes: >
      Scope depends on how the token was minted; api scope is effectively
      full account access. The glpat- prefix was introduced specifically
      to make these detectable by secret scanners. Users routinely paste
      these into git remote URLs
      (https://oauth2:glpat-...@gitlab.example.com/…), which Git then
      writes to .git/config in plaintext.

  - id: oauth-application-secret
    name: OAuth Application Secret
    description: >
      Client secret for an OAuth 2.0 application registered in GitLab,
      used when GitLab acts as an OAuth provider for other services.
    type: token
    nature: [user_defined]
    sensitivity: secret
    looks_like:
      - example: 'gloas-XXXXXXXXXXXXXXXXXXXX'
        pattern: 'gloas-[A-Za-z0-9_\-]{20,}'
    location:
      - type: source_code
        detail: OAuth client configuration in downstream applications
      - type: config_file
        detail: application config files that integrate with GitLab SSO
    notes: >
      A leaked OAuth application secret lets an attacker impersonate the
      downstream application to GitLab, potentially receiving user tokens
      via a spoofed authorization flow.

  - id: deploy-token
    name: Deploy Token
    description: >
      Project-scoped credential (username + token) for cloning, pushing,
      and pulling packages and container registry images. Not tied to a
      user account and cannot be used with the GitLab API.
    type: token
    nature: [user_defined]
    sensitivity: secret
    looks_like:
      - example: 'gldt-XXXXXXXXXXXXXXXXXXXX'
        pattern: 'gldt-[A-Za-z0-9_\-]{20,}'
        detail: prefix added in GitLab 16.7; older deploy tokens have no distinctive prefix
    location:
      - type: source_code
        detail: docker login / helm registry login flows in CI files, kustomize configs
      - type: environment
    notes: >
      Because deploy tokens have no user context, revocation and
      auditability are poor. A writable deploy token supports pushing
      malicious container images — a supply-chain concern for downstream
      consumers of the registry.

  - id: deploy-key
    name: Deploy Key
    description: >
      SSH key granting read-only or read-write access to a single
      repository, without a user account. The private key is what
      actually gets leaked.
    type: key_pair
    nature: [user_defined]
    sensitivity: secret
    looks_like:
      - pattern: '-----BEGIN (OPENSSH|RSA|EC|DSA) PRIVATE KEY-----'
        detail: >
          identified by the header line; a full PEM example is multi-line
          and unhelpful as a specimen
    location:
      - type: config_file
        path: '~/.ssh/id_*, deploy.key in CI runner homedirs and Kubernetes Secrets'
      - type: secret_store
    notes: >
      Scope is exactly one repo - smaller blast radius than a PAT, but
      writable deploy keys still enable per-repo supply-chain tampering.
      No 2FA, no user context.

  - id: runner-authentication-token
    name: Runner Authentication Token
    description: >
      Long-lived token stored on each GitLab Runner in config.toml,
      used to authenticate to GitLab and pick up jobs. Replaces the
      legacy runner registration token as of GitLab 16.0.
    type: token
    nature: [user_defined]
    sensitivity: secret
    looks_like:
      - example: 'glrt-XXXXXXXXXXXXXXXXXXXX'
        pattern: 'glrt-[A-Za-z0-9_\-]{20,}'
      - example: 'glrtr-XXXXXXXXXXXXXXXXXXXX'
        pattern: 'glrtr-[A-Za-z0-9_\-]{20,}'
        detail: variant prefix when created via the legacy registration workflow
    location:
      - type: config_file
        path: /etc/gitlab-runner/config.toml
        detail: 'token = "glrt-..." in each [[runners]] block'
      - type: secret_store
        detail: often referenced by Kubernetes Secrets when using the Runner Helm chart / operator
    notes: >
      GitLab's own docs: "Malicious access to a runner's file system might
      expose the config.toml file and the runner authentication token. The
      attacker could use the runner authentication token to clone the
      runner." A cloned runner picks up real jobs and sees their secrets
      as they run. Common exposure: config.toml baked into container images
      or checked into infrastructure repos.

  - id: runner-registration-token
    name: Runner Registration Token (legacy)
    description: >
      Legacy instance/group/project token used to register new runners.
      Deprecated in favor of runner authentication tokens (GitLab 16.0+)
      but still functional on many self-managed instances.
    type: token
    nature: [user_defined]
    sensitivity: secret
    looks_like:
      - pattern: '[A-Za-z0-9_\-]{20,}'
        detail: >
          no distinctive prefix on legacy registration tokens; identified
          by context (found in gitlab.rb or CI onboarding scripts)
    location:
      - type: config_file
        path: /etc/gitlab/gitlab.rb
        detail: "gitlab_rails['initial_shared_runners_registration_token']"
      - type: source_code
        detail: CI/CD onboarding scripts, Helm values files
    notes: >
      A leaked registration token lets an attacker register their own
      runner to the instance/group/project, which then picks up real
      jobs and reads their CI variables. The initial_shared_runners_registration_token
      set in gitlab.rb is the highest-value variant — it's the instance-wide
      token, baked into a config file most operators forget grants runner
      registration to anyone who reads it.

  - id: cicd-job-token
    name: CI/CD Job Token
    description: >
      Short-lived token injected into every CI/CD job as CI_JOB_TOKEN.
      Valid only for the duration of the job; grants a limited set of
      API endpoints authenticated as the user who triggered the job.
    type: token
    nature: [generated_on_install]
    sensitivity: secret
    looks_like:
      - example: 'glcbt-XXXXXXXXXXXXXXXXXXXX'
        pattern: 'glcbt-[A-Za-z0-9_\-]{20,}'
        detail: prefix added in GitLab 16.9 (feature gated in 16.8)
    location:
      - type: environment
        path: CI_JOB_TOKEN
      - type: logs
        detail: echo'd into job logs by misconfigured pipelines; visible in artifacts
    notes: >
      The token is short-lived but on shell/Docker Machine runners with
      MaxBuilds != 1 it can be captured by a subsequent job on the same
      host. Frequently accidentally echo'd in debug output despite
      GitLab's masking — masking is a display filter, not a control on
      what leaves the runner.

  - id: cluster-agent-token
    name: GitLab Agent for Kubernetes Token
    description: >
      Token that authenticates a GitLab Agent for Kubernetes back to the
      GitLab server. Grants the cluster agent the ability to receive
      configuration, run CI jobs on the cluster, and expose the cluster
      to GitLab-side features.
    type: token
    nature: [generated_on_install]
    sensitivity: secret
    looks_like:
      - example: 'glagent-XXXXXXXXXXXXXXXXXXXX'
        pattern: 'glagent-[A-Za-z0-9_\-]{20,}'
    location:
      - type: secret_store
        detail: 'Kubernetes Secret used by the agent Helm chart (typically named gitlab-agent-token)'
      - type: environment
    notes: >
      The token authenticates one side of a bidirectional control channel
      between GitLab and the cluster. A leaked agent token is essentially
      persistent cluster access from anyone who can reach the GitLab
      instance.

  - id: feed-token
    name: Feed Token
    description: >
      Long-lived user token embedded in RSS/calendar feed URLs. Does not
      expire. Grants read-only access to the user's activity feed —
      including confidential issues — as if they were the user.
    type: token
    nature: [generated_on_install]
    sensitivity: secret
    looks_like:
      - example: 'glft-XXXXXXXXXXXXXXXXXXXX'
        pattern: 'glft-[A-Za-z0-9_\-]{20,}'
    location:
      - type: source_code
        detail: RSS/calendar URLs pasted into feed readers, wikis, bookmarks
      - type: http_response
        detail: shared feed URLs in browser history and proxy logs
    notes: >
      Users routinely paste their feed URL (containing the token) into
      shared calendar tools, wikis, and cross-team Slack messages,
      treating it as "just a link." Anyone with the token sees every
      issue the user can see. Reset immediately if exposed.


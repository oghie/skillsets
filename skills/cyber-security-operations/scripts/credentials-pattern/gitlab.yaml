  - type: docs
    url: https://docs.gitlab.com/omnibus/settings/configuration/
  - type: docs
    url: https://docs.gitlab.com/ee/install/docker.html
  - type: docs
    url: https://docs.gitlab.com/ci/runners/new_creation_workflow/
  - type: docs
